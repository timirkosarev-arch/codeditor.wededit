<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Сайт проекта — WedEdit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b10; --bg-elevated: #12141c; --border: #23262f;
    --text-primary: #e8e9ed; --text-muted: #8a8f9c; --text-faint: #565b68;
    --accent-violet: #7c5cfc; --accent-mint: #5eead4; --accent-rose: #ff6b81;
    --font-display: "Sora", sans-serif; --font-body: "Inter", sans-serif; --font-mono: "JetBrains Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); }
  body { font-family: var(--font-body); }

  main { height: 100%; position: relative; background: #fff; }
  iframe { width: 100%; height: 100%; border: none; display: block; }

  .watermark {
    position: fixed; bottom: 12px; right: 12px; z-index: 999;
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted);
    background: rgba(18, 20, 28, 0.75);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 5px 12px;
    text-decoration: none;
    display: flex; align-items: center; gap: 5px;
    opacity: 0.85;
    transition: opacity 0.2s ease;
  }
  .watermark:hover { opacity: 1; }
  .watermark span { color: var(--accent-mint); }

  .state {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    background: var(--bg); color: var(--text-muted);
    font-family: var(--font-mono); font-size: 13px; text-align: center; padding: 20px;
  }
  .state.hidden { display: none; }
  .state h1 { font-family: var(--font-display); color: var(--text-primary); font-size: 20px; margin: 0; }
  .state a { color: var(--accent-mint); }
  .dot-flash { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-violet); animation: flash 1s ease-in-out infinite; }
  @keyframes flash { 50% { opacity: 0.2; } }
</style>
</head>
<body>

<a class="watermark" href="https://wededit.xyz/" target="_blank" rel="noopener">Сделано на wededit<span>.xyz</span></a>

<main>
  <div class="state" id="state-loading">
    <span class="dot-flash"></span>
    <div>Загрузка проекта…</div>
  </div>
  <div class="state hidden" id="state-notfound">
    <h1>Сайт не найден</h1>
    <div>Такой проект ещё не задеплоен, либо ссылка неверна.</div>
    <div><a href="https://wededit.xyz/">Вернуться на WedEdit →</a></div>
  </div>
  <iframe id="site-frame" style="display:none;" sandbox="allow-scripts"></iframe>
</main>

<script type="module">
import { firebaseConfig } from "/config.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const stateLoading = document.getElementById("state-loading");
const stateNotFound = document.getElementById("state-notfound");
const frame = document.getElementById("site-frame");

function getSlugFromUrl() {
  // Поддерживает и красивый путь /site/slug (через vercel.json rewrite),
  // и прямой доступ site.html?slug=slug (для локальной проверки).
  const params = new URLSearchParams(window.location.search);
  if (params.get("slug")) return params.get("slug");
  const parts = window.location.pathname.split("/").filter(Boolean);
  return parts[parts.length - 1] || "";
}

function buildDoc(html, css, js) {
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}
<script>
try {
${js}
} catch (e) { console.error(e); }
<\/script>
</body></html>`;
}

async function main() {
  const slug = getSlugFromUrl();
  if (!slug) {
    stateLoading.classList.add("hidden");
    stateNotFound.classList.remove("hidden");
    return;
  }
  try {
    const snap = await getDoc(doc(db, "publicSites", slug));
    if (!snap.exists()) {
      stateLoading.classList.add("hidden");
      stateNotFound.classList.remove("hidden");
      return;
    }
    const data = snap.data();
    frame.srcdoc = buildDoc(data.html || "", data.css || "", data.js || "");
    frame.style.display = "block";
    stateLoading.classList.add("hidden");
  } catch (err) {
    console.error(err);
    stateLoading.classList.add("hidden");
    stateNotFound.classList.remove("hidden");
  }
}
main();
</script>
</body>
</html>
